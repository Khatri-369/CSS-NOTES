<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOADER IN CSS</title>
    <style>
        body{
            align-items: center;
            justify-content: center;
            display:flex;
            height: 100vh;
        }
        .loader{
            width:100px;
            height:100px;
            border: 20px solid #6dff7e;
            border-top: 20px solid #07f5e5;
            border-radius: 100%;
            animation: spinAnimate 30s ease-in-out 0s infinite normal;
        }
        @keyframes spinAnimate{
            from{
                transform : rotate(0deg);
            }
            to{
                transform : rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="loader">
    </div>
</body>
</html>
