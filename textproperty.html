<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Property and decoration</title>
    <style>
        p{
            text-align:left;
            font-width: dark;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
        h1{
            text-align:center;
            text-decoration:blue underline;
        }
        a{
            text-decoration: none;
        }
        h2{
            font-width: lighter;
        }
    </style>
</head>
<body>
    <h1>Heading</h1>
    <h2>Heading</h2>
    <h2>Heading</h2>
    <h2>Heading</h2>
