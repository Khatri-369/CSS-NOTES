<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DISPLAY PROPERTY</title>
    <STYLE>
        div{
            display:inline;
        }
    </STYLE>
</head>
<body>
    <h2>DISPLAY : INLINE/BLOCK/INLINE-BLOCK/NONE</h2>
    <h3>INLINE = IN ONE LINE BUT WE DONT GIVE IT HEIGHT/WIDTH</h3>
     <h3>INLINE-BLOCK = IN ONE LINE BUT WE CAN GIVE IT HEIGHT/WIDTH</h3>
    <DIV style="background-color: pink;">THIS IS DIV</DIV> //BLOCK ELEMENT
    <button>CLICK ME</button> //INLINE ELEMENT 

    <div STYLE="background-color: blue;height:25px;width:25px;">BLUE</div>
    <div STYLE="background-color: green;height:25px;width:25px;">GREEN</div>
    <div STYLE="background-color: red;height:25px;width:25px;">RED</div>

    <h1>DISPLAY:NONE VS VISIBILITY:HIDDEN</h1>
    <div STYLE="background-color: blue;height:25px;width:25px;">BLUE</div>
    <div STYLE="background-color: green;height:25px;width:25px;visibility: hidden;">GREEN</div>
    <div STYLE="background-color: red;height:25px;width:25px;">RED</div>
</body>
</html>
