<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition</title>
    <style>
        div{
            height:100px;
            width:100px;
            justify-content: center;
            align-items: center;
            display: flex;
            background-color: lightpink;
            
            /* transition-property: all;
            transition-duration: 2s;
            transition-timing-function: steps(2); 
            transition-delay: 1s; */

            /* shortcut */

            /* transition : transition-property transition-duration transition-timing-function transition-delay */
            transition : all 0.7s ease-in 0s;
        }
        body{
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        div:hover{
            height:100px;
            width:100px;
            justify-content: center;
            align-items: center;
            display: flex;
            background-color: red;
            font-size: 20px;
            color: white;
        }
        div:active{
            height:100px;
            width:100px;
            justify-content: center;
            align-items: center;
            display: flex;
            background-color: blue;
            color:white;
            border-radius: 100%;
        }
    </style>
</head>
 <body>
    <!--element states = active,focus,hover,visited,target
    hover : on mouse over
    active : when press mouse and hold 
    
    transition-property: all;
    transition-duration: 1s;-->
    <div>
        HOLA !
    </div>
</body>
</html>
