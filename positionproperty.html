<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSITION PROPERTY</title>
    <style>
        div{
            height:50px;
            width:50px;
            background-color: aqua;
            border : 2px solid black;
            display: inline-block;
        }
        #box1{
            position: static;
        }
        #box2{
            position:relative;
            top:20px;
            left:30px;
            z-index: -1;
        }
        #box3{
            position:absolute;
            top:500px;
        }
        #box4{
            position: fixed;
            left:300px; 
        }
    </style>
</head>
<body>
    <h1>position : static,relative,absolute,fixed</h1>
    <h3>static : default position</h3>
    <h3>relative : element relative to itself</h3>
    <h3>absolute : position relative to its closest positiond parent</h3>
    <h3>fixed : position relative to browser</h3>
    <h3>sticky : position based on user's scroll position</h3>
        <div id="box1">BOX1</div>
        <div id="box2">BOX2</div>
        <div id="box3">BOX3</div>
        <div id="box4">BOX4</div>
</body>
</html>
