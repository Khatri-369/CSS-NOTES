<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDIA ELEMENT</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items:center;
            height:100vh;
        }
        .outer{
            height: 400px;
            width: 400px;
            background-color: blue;
            justify-content: center;
            display: flex;
            align-items: center;
        }
        .inner{
            height: 100px;
            width: 100px;
            background-color: purple;
        }
        @media(width : 600px){
            .outer{
                background-color: purple;
            }
            .inner{
                background-color: blue;
            }
        }
        @media(min-width : 600px){
            .outer{
                background-color: purple;
            }
            .inner{
                background-color: blue;
            }
        }
        @media(min-width : 300px) and (max-width : 600px){
            .outer{
                background-color: red;
            }
            .inner{
                background-color: red;
            }
        }
    </style>
</head>
<body>
    <div class="outer">
        <div class="inner">
        </div>
    </div>
</body>
</html>
